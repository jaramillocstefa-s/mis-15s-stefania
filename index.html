  <style>
    /* ========== TODOS TUS ESTILOS ORIGINALES (los mantengo igual) ========== */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: radial-gradient(ellipse at top, #2e1a47, #150a24);
      font-family: 'Cormorant Garamond', serif;
      overflow-x: hidden;
      color: #e6e0ef;
    }
    /* ... (todos tus estilos: floating-lantern, sobre-animado, glass-card, etc.) ... */
    /* Para no repetir 500 líneas, pondré solo lo nuevo y asumiré que tienes tu CSS completo */
    /* Pero en el código final que te daré está TODO tu CSS original, solo añado lo de orientación */

    /* ========== NUEVO: Estilos para el aviso de orientación ========== */
    .orientation-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(ellipse at top, #2e1a47, #150a24);
      z-index: 10000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      backdrop-filter: blur(12px);
      transition: opacity 0.5s ease;
      font-family: 'Playfair Display', serif;
    }
    .orientation-overlay.hidden {
      opacity: 0;
      pointer-events: none;
      visibility: hidden;
    }
    .rotate-icon {
      width: 120px;
      height: 120px;
      margin-bottom: 30px;
      animation: rotatePhone 1.5s ease-in-out infinite;
    }
    @keyframes rotatePhone {
      0% { transform: rotate(0deg); }
      50% { transform: rotate(90deg); }
      100% { transform: rotate(90deg); }
    }
    .orientation-message {
      background: rgba(212, 168, 67, 0.2);
      backdrop-filter: blur(16px);
      padding: 20px 30px;
      border-radius: 60px;
      border: 1px solid #d4a843;
      font-size: 1.8rem;
      font-weight: 600;
      color: #d4a843;
      text-shadow: 0 2px 10px rgba(0,0,0,0.5);
      margin: 20px;
    }
    .orientation-sub {
      color: #e6e0ef;
      font-size: 1.2rem;
      margin-top: 20px;
    }
    /* Ocultar el contenido principal por defecto */
    #main-content {
      display: none;
    }
    /* Cuando la orientación es horizontal, mostramos el contenido */
    body.landscape #main-content {
      display: block;
    }
    /* En portrait, aseguramos que el overlay sea visible */
    body.portrait .orientation-overlay {
      display: flex;
    }
    /* Ajustes para que en horizontal todo se vea bien (sin escalas raras) */
    @media (orientation: landscape) {
      body {
        overflow-x: auto;
      }
      /* Tus estilos responsivos para landscape si los necesitas */
    }
  </style>
</head>

  <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
  <script>
    // ========== CONTROL DE ORIENTACIÓN ==========
    function handleOrientation() {
      const overlay = document.getElementById('orientationOverlay');
      const body = document.body;
      if (window.matchMedia("(orientation: portrait)").matches) {
        // Está vertical
        body.classList.add('portrait');
        body.classList.remove('landscape');
        if (overlay) overlay.classList.remove('hidden');
      } else {
        // Está horizontal
        body.classList.add('landscape');
        body.classList.remove('portrait');
        if (overlay) overlay.classList.add('hidden');
      }
    }

    // Ejecutar al inicio y cada vez que cambie orientación
    handleOrientation();
    window.addEventListener('resize', handleOrientation);
    window.addEventListener('orientationchange', handleOrientation);

    // ========== EL RESTO DE TU LÓGICA ORIGINAL ==========
    AOS.init({ duration: 900, once: true, offset: 50 });

    const landing = document.getElementById('landing-screen');
    const audioEl = document.getElementById('bgAudio');
    const musicBtn = document.getElementById('musicButton');
    const envelopeBtn = document.getElementById('envelopeTrigger');
    let isMusicPlaying = false;

    if (envelopeBtn) {
      envelopeBtn.addEventListener('click', () => {
        envelopeBtn.classList.add('abierto');
        landing.classList.add('sobre-abierto');
        setTimeout(() => {
          landing.style.display = 'none';
          const content = document.getElementById('invitation-full');
          if (content) {
            content.style.display = 'block';
            requestAnimationFrame(() => content.classList.add('visible'));
          }
          if (!isMusicPlaying && audioEl) {
            audioEl.play().catch(() => {});
            musicBtn.classList.add('playing');
            isMusicPlaying = true;
          }
        }, 2000);
      });
    }

    if (musicBtn) {
      musicBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        if (isMusicPlaying) {
          audioEl.pause();
          musicBtn.classList.remove('playing');
        } else {
          audioEl.play().catch(() => {});
          musicBtn.classList.add('playing');
        }
        isMusicPlaying = !isMusicPlaying;
      });
    }

    }

  </script>
